<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 85" fill="none">
  <!-- Left leg of A (red) -->
  <path d="M5 80 L48 6 L64 6 L24 80 Z" fill="#dc2626"/>
  <!-- Crossbar of A (red) — extends slightly into D opening -->
  <path d="M22 48 L90 48 L90 60 L26 60 Z" fill="#dc2626"/>

  <!-- D mark (blue) — evenodd punch creates hollow letter -->
  <path fill="#1d4ed8" fill-rule="evenodd" d="
    M64 6 L79 6 C134 6 148 24 148 43 C148 62 134 80 79 80 L64 80 Z
    M64 18 L79 18 C117 18 131 29 131 43 C131 57 117 68 79 68 L64 68 Z
  "/>

  <!-- Divider -->
  <line x1="154" y1="10" x2="154" y2="74" stroke="#374151" stroke-width="1"/>

  <!-- AMERICAN -->
  <text x="164" y="43"
    font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif"
    font-size="37" font-weight="900"
    fill="#ffffff" letter-spacing="2">AMERICAN</text>

  <!-- DISTRIBUTORS -->
  <text x="164" y="77"
    font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif"
    font-size="30" font-weight="900"
    fill="#93c5fd" letter-spacing="1.5">DISTRIBUTORS</text>
</svg>
